<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">WiFi Doorbell Chime wiring diagram</title>
  <desc id="desc">Simplified wiring diagram showing ESP32-S3 to MAX98357A I2S amplifier, speaker, button, and USB power.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.esp{fill:#e0f2fe;stroke:#0369a1;stroke-width:3}.amp{fill:#ecfccb;stroke:#65a30d;stroke-width:3}.power{fill:#ffedd5;stroke:#ea580c;stroke-width:3}.speaker{fill:#111827;stroke:#111827}.cone{fill:#e5e7eb;stroke:#94a3b8;stroke-width:3}.label{font:700 24px system-ui,sans-serif;fill:#0f172a}.small{font:17px system-ui,sans-serif;fill:#334155}.pin{font:600 15px ui-monospace,monospace;fill:#0f172a}.wire{fill:none;stroke:#2563eb;stroke-width:4;marker-end:url(#arrow)}.red{stroke:#dc2626}.black{stroke:#111827}.green{stroke:#16a34a}.orange{stroke:#f97316}.note{fill:#fff7ed;stroke:#fb923c;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1120" height="700"/>
  <text x="40" y="55" class="label">Simplified Wiring Diagram</text>
  <text x="40" y="84" class="small">Pin assignments come from the firmware. Verify physical power routing before reproducing.</text>

  <rect x="70" y="150" width="260" height="360" rx="18" class="esp"/>
  <text x="105" y="195" class="label">ESP32-S3</text>
  <text x="112" y="225" class="small">Super Mini</text>
  <text x="95" y="285" class="pin">GPIO4  BCLK</text>
  <text x="95" y="325" class="pin">GPIO5  LRCLK</text>
  <text x="95" y="365" class="pin">GPIO6  DOUT</text>
  <text x="95" y="420" class="pin">GPIO13 BUTTON</text>
  <text x="95" y="460" class="pin">GND</text>
  <text x="95" y="500" class="pin">5V/VBUS or 3V3</text>

  <rect x="475" y="160" width="260" height="260" rx="18" class="amp"/>
  <text x="515" y="205" class="label">MAX98357A</text>
  <text x="530" y="235" class="small">I2S mono amp</text>
  <text x="505" y="285" class="pin">BCLK</text>
  <text x="505" y="325" class="pin">LRC</text>
  <text x="505" y="365" class="pin">DIN</text>
  <text x="650" y="285" class="pin">VIN</text>
  <text x="650" y="325" class="pin">GND</text>
  <text x="650" y="365" class="pin">SPK+ / SPK-</text>

  <circle cx="930" cy="280" r="82" class="speaker"/>
  <circle cx="930" cy="280" r="54" class="cone"/>
  <text x="865" y="405" class="label">Speaker</text>
  <text x="850" y="435" class="small">8 ohm / 3 W shown</text>

  <rect x="475" y="495" width="260" height="92" rx="18" class="box"/>
  <text x="515" y="535" class="label">Play Button</text>
  <text x="500" y="565" class="small">GPIO13 to GND, internal pull-up</text>

  <rect x="810" y="505" width="240" height="82" rx="18" class="power"/>
  <text x="855" y="545" class="label">USB-C Power</text>
  <text x="840" y="573" class="small">via ESP32 USB-C cable</text>

  <path d="M330 280 H475" class="wire"/>
  <path d="M330 320 H475" class="wire green"/>
  <path d="M330 360 H475" class="wire orange"/>
  <text x="365" y="270" class="pin">GPIO4 -> BCLK</text>
  <text x="365" y="310" class="pin">GPIO5 -> LRC</text>
  <text x="365" y="350" class="pin">GPIO6 -> DIN</text>

  <path d="M330 500 C390 500, 390 285, 475 285" class="wire red"/>
  <path d="M330 460 C395 460, 395 325, 475 325" class="wire black"/>
  <text x="355" y="470" class="pin">Power and ground</text>

  <path d="M735 365 C790 365, 825 315, 855 295" class="wire black"/>
  <path d="M735 382 C790 382, 825 360, 862 335" class="wire red"/>
  <text x="775" y="360" class="pin">Amp speaker outputs only</text>

  <path d="M330 420 C400 420, 410 535, 475 535" class="wire green"/>
  <path d="M330 460 C400 460, 410 565, 475 565" class="wire black"/>

  <path d="M930 505 C930 470, 785 480, 735 500" class="wire red"/>
  <path d="M930 587 C900 620, 400 620, 330 500" class="wire black"/>

  <rect x="70" y="555" width="330" height="92" rx="16" class="note"/>
  <text x="92" y="590" class="label">Important</text>
  <text x="92" y="620" class="small">Do not connect speaker negative to ground.</text>
</svg>
