<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">WiFi Doorbell Chime enclosure layout</title>
  <desc id="desc">Simplified enclosure layout showing front grille, speaker, electronics board, USB cable, and rear access.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.shell{fill:#e5e7eb;stroke:#64748b;stroke-width:4}.cut{fill:#f8fafc;stroke:#94a3b8;stroke-width:3}.grille{fill:#d6a15f;stroke:#92400e;stroke-width:3}.board{fill:#ef4444;stroke:#991b1b;stroke-width:3}.esp{fill:#0f172a}.amp{fill:#2563eb}.speaker{fill:#111827}.cone{fill:#e5e7eb;stroke:#94a3b8;stroke-width:3}.usb{fill:#334155;stroke:#0f172a;stroke-width:3}.cable{fill:none;stroke:#111827;stroke-width:8;stroke-linecap:round}.label{font:700 24px system-ui,sans-serif;fill:#0f172a}.small{font:17px system-ui,sans-serif;fill:#334155}.call{fill:none;stroke:#334155;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1100" height="650"/>
  <text x="40" y="55" class="label">Enclosure Layout</text>
  <text x="40" y="84" class="small">Top view of the prototype based on the internal assembly photos.</text>

  <circle cx="360" cy="350" r="225" class="shell"/>
  <circle cx="360" cy="350" r="175" class="cut"/>
  <rect x="280" y="402" width="165" height="88" rx="12" class="board"/>
  <rect x="330" y="415" width="88" height="56" rx="8" class="esp"/>
  <rect x="245" y="420" width="55" height="35" rx="5" class="amp"/>
  <rect x="250" y="255" width="220" height="128" rx="22" class="speaker"/>
  <circle cx="360" cy="319" r="58" class="cone"/>
  <path d="M485 225 C535 215, 552 280, 520 340 C500 378, 540 410, 510 455" class="cable"/>
  <rect x="464" y="168" width="110" height="56" rx="10" class="usb"/>
  <rect x="498" y="181" width="42" height="20" rx="4" fill="#e5e7eb"/>
  <rect x="286" y="118" width="150" height="58" rx="12" fill="#111827"/>
  <rect x="310" y="134" width="102" height="30" rx="5" fill="#020617"/>
  <text x="292" y="102" class="small">Rear/top USB opening</text>

  <circle cx="805" cy="350" r="150" class="shell"/>
  <circle cx="805" cy="350" r="104" class="grille"/>
  <g fill="#7c2d12" opacity="0.55">
    <circle cx="745" cy="305" r="5"/><circle cx="775" cy="305" r="5"/><circle cx="805" cy="305" r="5"/><circle cx="835" cy="305" r="5"/><circle cx="865" cy="305" r="5"/>
    <circle cx="730" cy="335" r="5"/><circle cx="760" cy="335" r="5"/><circle cx="790" cy="335" r="5"/><circle cx="820" cy="335" r="5"/><circle cx="850" cy="335" r="5"/><circle cx="880" cy="335" r="5"/>
    <circle cx="745" cy="365" r="5"/><circle cx="775" cy="365" r="5"/><circle cx="805" cy="365" r="5"/><circle cx="835" cy="365" r="5"/><circle cx="865" cy="365" r="5"/>
    <circle cx="760" cy="395" r="5"/><circle cx="790" cy="395" r="5"/><circle cx="820" cy="395" r="5"/><circle cx="850" cy="395" r="5"/>
  </g>
  <text x="705" y="535" class="label">Front grille</text>
  <text x="685" y="565" class="small">Speaker faces outward</text>

  <path d="M655 220 L468 295" class="call"/>
  <text x="665" y="220" class="label">Speaker near front</text>
  <text x="665" y="250" class="small">Centered behind grille opening</text>

  <path d="M660 335 L425 445" class="call"/>
  <text x="670" y="335" class="label">Prototype board</text>
  <text x="670" y="365" class="small">ESP32 and amp mounted behind speaker</text>

  <path d="M655 455 L520 260" class="call"/>
  <text x="665" y="455" class="label">USB cable loop</text>
  <text x="665" y="485" class="small">Routes to rear/top access port</text>
</svg>
