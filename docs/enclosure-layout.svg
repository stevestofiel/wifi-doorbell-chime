<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">WiFi Doorbell Chime enclosure layout</title>
  <desc id="desc">Approximate top-down enclosure layout for the cylindrical Wi-Fi doorbell chime prototype.</desc>
  <defs>
    <style>
      .page{fill:#f8fafc}
      .title{font:700 30px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}
      .sub{font:17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
      .h{font:700 20px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}
      .t{font:15px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#334155}
      .mono{font:600 14px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#0f172a}
      .shell{fill:#f1f5f9;stroke:#64748b;stroke-width:4}
      .inner{fill:#fff;stroke:#cbd5e1;stroke-width:2}
      .grille{fill:#fde68a;stroke:#d97706;stroke-width:3}
      .speaker{fill:#111827;stroke:#111827;stroke-width:2}
      .board{fill:#fee2e2;stroke:#dc2626;stroke-width:2}
      .esp{fill:#dbeafe;stroke:#2563eb;stroke-width:2}
      .amp{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
      .usb{fill:#e2e8f0;stroke:#475569;stroke-width:2}
      .cable{stroke:#334155;stroke-width:9;stroke-linecap:round;fill:none}
      .call{stroke:#475569;stroke-width:2;fill:none}
      .note{fill:#fff7ed;stroke:#fb923c;stroke-width:2}
    </style>
  </defs>

  <rect class="page" width="1200" height="820"/>
  <text x="48" y="58" class="title">Enclosure Layout</text>
  <text x="48" y="88" class="sub">Approximate top-down assembly sketch from prototype photos. Not to scale.</text>

  <text x="170" y="145" class="h">Front view</text>
  <circle cx="300" cy="350" r="170" class="shell"/>
  <circle cx="300" cy="350" r="118" class="grille"/>
  <g fill="#92400e" opacity="0.65">
    <circle cx="240" cy="310" r="5"/><circle cx="270" cy="310" r="5"/><circle cx="300" cy="310" r="5"/><circle cx="330" cy="310" r="5"/><circle cx="360" cy="310" r="5"/>
    <circle cx="225" cy="340" r="5"/><circle cx="255" cy="340" r="5"/><circle cx="285" cy="340" r="5"/><circle cx="315" cy="340" r="5"/><circle cx="345" cy="340" r="5"/><circle cx="375" cy="340" r="5"/>
    <circle cx="240" cy="370" r="5"/><circle cx="270" cy="370" r="5"/><circle cx="300" cy="370" r="5"/><circle cx="330" cy="370" r="5"/><circle cx="360" cy="370" r="5"/>
    <circle cx="255" cy="400" r="5"/><circle cx="285" cy="400" r="5"/><circle cx="315" cy="400" r="5"/><circle cx="345" cy="400" r="5"/>
  </g>
  <text x="205" y="555" class="t">Round grille faces the room</text>

  <text x="650" y="145" class="h">Internal top-down layout</text>
  <circle cx="800" cy="365" r="220" class="shell"/>
  <circle cx="800" cy="365" r="182" class="inner"/>

  <rect x="705" y="230" width="190" height="105" rx="14" class="speaker"/>
  <circle cx="800" cy="282" r="42" fill="#e5e7eb" stroke="#94a3b8" stroke-width="3"/>
  <text x="690" y="215" class="t">Speaker module near front</text>

  <rect x="690" y="390" width="220" height="96" rx="10" class="board"/>
  <rect x="776" y="406" width="78" height="56" rx="8" class="esp"/>
  <rect x="704" y="414" width="54" height="34" rx="6" class="amp"/>
  <text x="704" y="510" class="t">Prototype board behind speaker</text>

  <path d="M910 255 C1005 245 1030 360 950 430" class="cable"/>
  <rect x="865" y="158" width="125" height="54" rx="9" class="usb"/>
  <rect x="902" y="174" width="50" height="18" rx="4" fill="#fff"/>
  <text x="910" y="135" class="t">USB access</text>

  <path d="M565 278 H705" class="call"/>
  <text x="455" y="270" class="h">Speaker</text>
  <text x="455" y="296" class="t">Faces grille opening</text>

  <path d="M565 438 H690" class="call"/>
  <text x="425" y="430" class="h">Electronics</text>
  <text x="425" y="456" class="t">Board and modules</text>

  <path d="M990 188 H1040" class="call"/>
  <text x="1000" y="245" class="h">USB power</text>
  <text x="1000" y="271" class="t">Short cable loop</text>

  <rect x="110" y="650" width="980" height="86" rx="14" class="note"/>
  <text x="140" y="685" class="h">Assembly notes</text>
  <text x="140" y="712" class="t">Add strain relief for the USB cable, keep speaker cone clear of wiring, and leave access to the USB-C connector for firmware updates.</text>
</svg>
